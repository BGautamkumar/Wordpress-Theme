<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign Up - Aspire</title>
  
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800;900&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  
  <link rel="stylesheet" href="/src/styles/main.css">
  <script type="module" src="/src/scripts/main.js"></script>
</head>
<body class="font-body text-textMain bg-darkBg antialiased min-h-screen flex flex-col relative overflow-hidden">

  <!-- Cinematic Background Elements -->
  <div class="absolute top-[-20%] right-[-10%] w-[800px] h-[800px] bg-primary/10 rounded-full blur-[150px] pointer-events-none z-0"></div>
  <div class="absolute bottom-[-20%] left-[-10%] w-[600px] h-[600px] bg-purple-500/10 rounded-full blur-[150px] pointer-events-none z-0"></div>

  <!-- Navigation -->
  <nav class="glass-nav relative z-50">
    <div class="container mx-auto px-6 py-4">
      <div class="flex items-center justify-between">
        <a href="/" class="text-3xl font-black font-heading tracking-tight text-textMain">Aspire<span class="text-primary">.</span></a>
        <a href="/pages/signin.html" class="text-sm font-medium hover:text-primary transition-colors">Already have an account? Sign in →</a>
      </div>
    </div>
  </nav>

  <!-- Main Content -->
  <main class="flex-grow flex items-center justify-center p-6 relative z-10">
    <div class="w-full max-w-md animate-on-scroll">
      
      <div class="text-center mb-10">
        <h1 class="text-4xl font-black font-heading mb-3">Create Account</h1>
        <p class="text-textMuted text-lg">Join the fastest headless commerce platform.</p>
      </div>

      <div class="bg-surface/60 backdrop-blur-2xl border border-borderDim rounded-3xl p-10 shadow-[0_20px_60px_rgba(0,0,0,0.5)]">
        <form id="auth-form" class="space-y-6">
          <div class="space-y-2">
            <label for="name" class="block text-sm font-bold text-textMuted">Full Name</label>
            <input type="text" id="name" class="input-premium w-full" placeholder="John Doe" required>
          </div>

          <div class="space-y-2">
            <label for="email" class="block text-sm font-bold text-textMuted">Email Address</label>
            <input type="email" id="email" class="input-premium w-full" placeholder="name@company.com" required>
          </div>
          
          <div class="space-y-2">
            <label for="password" class="block text-sm font-bold text-textMuted">Password</label>
            <input type="password" id="password" class="input-premium w-full" placeholder="••••••••" required>
          </div>
          
          <button type="submit" class="btn-primary w-full justify-center py-4 text-lg mt-4">
            Sign Up
          </button>
        </form>

        <div class="mt-8 text-center text-sm text-textMuted leading-relaxed">
          By signing up, you agree to our <a href="#" class="font-bold text-white hover:text-primary transition-colors">Terms of Service</a> and <a href="#" class="font-bold text-white hover:text-primary transition-colors">Privacy Policy</a>.
        </div>
      </div>
      
    </div>
  </main>
</body>
</html>
